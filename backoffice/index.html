<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Backoffice Redirect</title>
  <meta http-equiv="refresh" content="0; url=../boindex.html">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f3fbff;color:#123047;text-align:center;padding:24px}
    a{color:#075f73;font-weight:800}
  </style>
</head>
<body>
  <main>
    <h1>מעבירה לעמוד הניהול החדש…</h1>
    <p><a id="go" href="../boindex.html">לחיצה כאן אם המעבר לא התחיל</a></p>
  </main>
  <script>
    (function(){
      var target="../boindex.html"+(location.search||"")+(location.hash||"");
      var link=document.getElementById("go");
      if(link)link.href=target;
      location.replace(target);
    })();
  </script>
</body>
</html>
