<!doctype html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><title>השעון המשפחתי</title><style>
@import url("https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap");

:root{
  --bg:#f6f1e9; --bg2:#eaf5f0; --ink:#253633; --muted:#6b7d79;
  --card:#fffdf8; --line:#e6dccf; --soft:#f3eadc; --warm:#fff2c9;
  --green:#e4f4ea; --green2:#2f7d57; --blue:#e5f1fb; --blue2:#2f6297;
  --rose:#ffe7e0; --rose2:#9b382c; --lav:#efe9ff; --lav2:#6554a3;
  --shadow:0 24px 60px rgba(70,60,45,.13); --radius:34px; --focus:#2f7d57;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:"Assistant",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:
radial-gradient(circle at 84% 10%,rgba(228,244,234,.85),transparent 36%),
radial-gradient(circle at 8% 86%,rgba(255,242,201,.70),transparent 34%),
linear-gradient(135deg,var(--bg),var(--bg2));color:var(--ink)}
body.night{--bg:#111f1d;--bg2:#0b1513;--ink:#edf7f2;--muted:#c6d8d2;--card:#1d2d29;--line:#35524c;--soft:#263b36;--warm:#463d22;--green:#274338;--blue:#25394c}
body.sundown{--bg:#fff3dc;--bg2:#f2e2ca;--card:#fffaf0;--soft:#ffefd0;--line:#ead5b1}
body.absolute-night{background:#07110f!important;color:#f7fff9!important}
a{color:inherit;text-decoration:none}
button,input,textarea,select{font:inherit}
button{border:0;cursor:pointer}
.shell{max-width:1500px;margin:0 auto;padding:18px}
.hero{border-radius:44px;padding:30px;background:rgba(255,253,248,.88);backdrop-filter:blur(12px);border:1px solid rgba(231,222,210,.85);box-shadow:var(--shadow)}
body.night .hero{background:rgba(29,45,41,.92)}
.hero-grid{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.pill{display:inline-flex;align-items:center;gap:10px;border-radius:999px;background:var(--soft);padding:10px 18px;font-weight:950;font-size:24px;color:var(--ink)}
.h1{font-size:clamp(52px,7vw,100px);line-height:.98;margin:16px 0 0;font-weight:1000;letter-spacing:-1px}
.lead{font-size:clamp(28px,3vw,44px);line-height:1.35;font-weight:850;color:var(--muted);margin:18px 0 0;max-width:900px}
.clock-card{min-width:350px;background:#fff;border-radius:36px;padding:24px;text-align:center;box-shadow:0 16px 42px rgba(67,60,48,.14);color:#24312f}
.time-row{display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap}
.digital{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:clamp(62px,7vw,98px);font-weight:1000;letter-spacing:-5px;line-height:1}
.date{font-size:clamp(28px,3vw,42px);font-weight:1000;line-height:1.15;margin-top:10px}
.today{display:inline-block;margin-top:12px;background:var(--warm);border-radius:20px;padding:10px 28px;font-size:30px;font-weight:1000;color:#4d3510}
.nav{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.nav a,.nav button,.btn{border-radius:20px;padding:14px 20px;background:var(--ink);color:#fff;font-size:20px;font-weight:1000;display:inline-flex;gap:9px;align-items:center;justify-content:center}
.nav .soft,.btn.soft{background:var(--soft);color:var(--ink)}
.nav .warm,.btn.warm{background:#ffd979;color:#513307}
.btn.green{background:var(--green2);color:#fff}.btn.blue{background:var(--blue2);color:#fff}.btn.rose{background:var(--rose2);color:#fff}.btn.lav{background:var(--lav2);color:#fff}
.notice{margin-top:18px;background:var(--soft);border-radius:24px;padding:16px 18px;font-size:24px;font-weight:900;color:var(--ink)}
.section{margin-top:18px}
.grid{display:grid;gap:18px}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.wide{grid-template-columns:2fr 1fr}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);color:var(--ink)}
.card.warm{background:#fff8e7;color:#24312f}.card.green{background:#effaf3;color:#24312f}.card.blue{background:#eef7ff;color:#24312f}.card.rose{background:#fff0ed;color:#47221d}.card.lav{background:#f4efff;color:#2e2555}
.title{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.icon{width:62px;height:62px;border-radius:22px;background:var(--soft);display:grid;place-items:center;font-size:33px;flex:0 0 auto}
.title h2{font-size:clamp(30px,3vw,44px);line-height:1.08;margin:0;font-weight:1000}
.title p{font-size:20px;color:var(--muted);font-weight:750;margin:7px 0 0;line-height:1.35}
.big{font-size:clamp(34px,4vw,58px);line-height:1.32;font-weight:1000}.medium{font-size:27px;line-height:1.45;font-weight:850}.small{font-size:19px;color:var(--muted);font-weight:800}
.nowgrid{display:grid;gap:16px;grid-template-columns:repeat(3,minmax(0,1fr))}
.nowtile{border-radius:30px;border:2px solid var(--line);background:#fffaf3;padding:22px;color:#24312f}.nowtile.current{background:#e8f4ff;border:4px solid #87b7e5}
.emoji{font-size:68px;line-height:1;margin:8px 0}.badge{display:inline-block;margin-top:14px;border-radius:18px;background:var(--ink);color:#fff;padding:10px 18px;font:1000 34px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.person{display:flex;align-items:center;gap:16px}.avatar{width:96px;height:96px;border-radius:30px;background:var(--soft);display:grid;place-items:center;font-size:56px;overflow:hidden;flex:0 0 auto}.avatar img{width:100%;height:100%;object-fit:cover}
.contact{border-radius:30px;border:2px solid var(--line);background:#fffaf3;padding:20px;margin-top:12px;color:#24312f}.contacttop{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}
.phone{display:block;background:#2f7d57;color:white;border-radius:28px;padding:18px 26px;font:1000 clamp(34px,4vw,62px) ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;direction:ltr;text-align:center}.video{display:block;background:#2f6297;color:white;border-radius:24px;padding:14px 18px;text-align:center;font-size:24px;font-weight:1000;margin-top:10px}
.details{margin-top:12px;background:#fff;border-radius:22px;padding:14px;color:#24312f}.details summary{font-size:22px;font-weight:1000;cursor:pointer}.qr{display:grid;grid-template-columns:230px 1fr;gap:16px;margin-top:14px;align-items:center}.qr img{width:220px;height:220px;background:white;border-radius:18px}
.familygrid{display:grid;gap:16px;grid-template-columns:repeat(3,minmax(0,1fr))}
.formgrid{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr))}.formgrid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.formgrid.one{grid-template-columns:1fr}
label{display:grid;gap:7px;font-size:17px;font-weight:950;color:var(--muted)}
input,textarea,select{width:100%;border:2px solid var(--line);border-radius:18px;padding:13px 14px;background:#fff;color:#24312f;font-size:20px;font-weight:800;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--focus);box-shadow:0 0 0 4px rgba(47,125,87,.12)}
textarea{min-height:108px;resize:vertical}
.tabs{display:flex;gap:10px;flex-wrap:wrap}.tabs button{border-radius:18px;background:var(--soft);color:var(--ink);padding:12px 16px;font-size:18px;font-weight:1000}.tabs button.active{background:var(--ink);color:#fff}
.row{border:2px solid var(--line);background:#fffaf3;border-radius:26px;padding:16px;margin-top:12px;color:#24312f}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.checkgrid{display:grid;gap:14px;grid-template-columns:repeat(3,minmax(0,1fr))}
.check{border:2px solid var(--line);background:#fffaf3;border-radius:28px;padding:22px;font-size:25px;font-weight:1000;color:#24312f}.check.done{background:#dcfce7;color:#14532d;border-color:#8ee0a9}
.summary{display:grid;gap:14px;grid-template-columns:repeat(4,minmax(0,1fr))}.summarybox{background:white;color:#24312f;border-radius:24px;padding:18px}.summarybox .big2{font-size:34px;font-weight:1000}
.month{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.mhead{background:var(--ink);color:white;border-radius:16px;padding:13px;text-align:center;font-size:22px;font-weight:1000}.day{min-height:128px;border:2px solid var(--line);border-radius:18px;background:#fffaf3;padding:10px;color:#24312f}.day.today{background:#fff2cc;border-color:#e4b84c}.num{display:inline-grid;place-items:center;width:44px;height:44px;border-radius:14px;background:white;font-size:26px;font-weight:1000}.event{margin-top:6px;background:white;border-radius:12px;padding:8px;font-size:17px;font-weight:900}
.calm,.ping,.memories{position:fixed;inset:0;z-index:20;overflow:auto;padding:24px;color:#24312f}
.calm{background:#fff8e7}.ping{background:linear-gradient(135deg,#f1ffe9,#fff8c7);display:grid;place-items:center}.memories{background:radial-gradient(circle at 18% 10%,rgba(255,242,201,.75),transparent 32%),linear-gradient(135deg,#f8efe1,#e8f5ee);display:grid;place-items:center;animation:memGlow 16s ease-in-out infinite alternate}
@keyframes memGlow{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(8deg)}}
.calmin,.pingin,.memin{max-width:1120px;margin:auto;width:100%}
.calmhero,.pingbox,.membox{text-align:center;background:rgba(255,255,255,.88);border-radius:46px;padding:34px;box-shadow:var(--shadow);border:1px solid rgba(231,222,210,.7)}
.calmhero h1,.pingbox h1,.membox h1{font-size:clamp(54px,8vw,96px);line-height:1.05;margin:0;font-weight:1000}
.calmhero p,.pingbox p{font-size:clamp(40px,5vw,68px);font-weight:1000;margin:22px 0 0;line-height:1.22}
.memphoto{width:min(78vw,760px);height:min(58vh,560px);margin:0 auto 24px;border-radius:48px;background:var(--soft);display:grid;place-items:center;overflow:hidden;font-size:clamp(90px,18vw,190px);box-shadow:0 30px 70px rgba(70,60,45,.18)}
.memphoto img{width:100%;height:100%;object-fit:cover}
.memcaption{font-size:clamp(46px,7vw,92px);font-weight:1000;line-height:1.1}
.memsub{font-size:clamp(26px,3vw,42px);font-weight:900;color:#667774;margin-top:12px}
.full{width:100%;margin-top:18px;border-radius:28px;padding:20px;background:var(--ink);color:white;font-size:32px;font-weight:1000}
.nightScreen{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 20%,#1e3a34,transparent 42%),#07110f;color:#f7fff9;text-align:center}
.nightBox{max-width:1100px}.moon{font-size:clamp(90px,16vw,180px);line-height:1}.nightTime{font:1000 clamp(82px,14vw,190px) ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:-8px;margin:16px 0}.nightText{font-size:clamp(38px,6vw,78px);font-weight:1000;line-height:1.25}.bath{margin-top:28px;font-size:clamp(30px,4vw,52px);font-weight:950;color:#d9f99d}
.footer{margin-top:18px;background:rgba(36,49,47,.9);color:white;border-radius:28px;padding:18px;text-align:center;font-size:18px;font-weight:850}
.status{position:fixed;left:18px;bottom:18px;background:#24312f;color:white;border-radius:18px;padding:12px 16px;font-weight:950;box-shadow:var(--shadow);z-index:40;display:none}.status.show{display:block}

.offlineBadge,.wakeBadge,.weatherBadge{
  position:fixed;z-index:45;border-radius:999px;padding:10px 14px;font-weight:1000;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:8px;font-size:16px
}
.offlineBadge{top:16px;left:16px;background:#fee2e2;color:#991b1b;border:2px solid #fecaca}
.wakeBadge{top:16px;right:16px;background:#dcfce7;color:#14532d;border:2px solid #86efac}
.weatherInline{margin-top:14px;border-radius:24px;background:#eef7ff;color:#24312f;padding:14px 18px;font-size:24px;font-weight:950;display:inline-flex;gap:12px;align-items:center;justify-content:center}
.musicOverlay,.bookOverlay{position:fixed;inset:0;z-index:28;background:rgba(20,31,29,.88);display:grid;place-items:center;padding:24px}
.musicBox,.bookBox{width:min(1100px,96vw);max-height:92vh;overflow:auto;background:#fffdf8;color:#24312f;border-radius:42px;padding:24px;box-shadow:var(--shadow)}
.musicFrame{width:100%;aspect-ratio:16/9;border:0;border-radius:28px;background:#111}
.signGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
.signCard{background:#ffe45c;color:#000;border:6px solid #000;border-radius:18px;padding:28px;text-align:center;min-height:220px;display:grid;place-items:center;break-inside:avoid}
.signIcon{font-size:78px;line-height:1}.signText{font-size:58px;font-weight:1000;line-height:1}
.bookPages{display:grid;gap:18px}.bookPage{background:white;color:#111;border:2px solid #e5e7eb;border-radius:24px;padding:32px;min-height:520px;display:grid;align-content:center;justify-items:center;text-align:center;break-after:page}
.bookPage h2{font-size:54px;margin:0 0 22px;font-weight:1000}.bookPage p{font-size:42px;line-height:1.25;font-weight:950;margin:10px 0}.bookFaces{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}.bookFace{width:180px}.bookFace .avatar{margin:auto}.bookFace div:last-child{font-size:26px;font-weight:1000;margin-top:8px}
.daysPicker{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.dayChip{border:2px solid var(--line);border-radius:14px;padding:9px 11px;background:#fff;color:#24312f;font-weight:1000}.dayChip input{width:auto;margin-inline-end:4px}
.heartbeatBox{border-radius:24px;padding:18px;background:#fff;color:#24312f;margin-top:14px}
@media print{
  body.print-signs .shell>*, body.print-book .shell>*{display:none!important}
  body.print-signs #printArea, body.print-book #printArea{display:block!important}
  .signGrid{grid-template-columns:repeat(2,1fr)}
  .signCard{height:45vh}
  .bookPage{height:95vh;border:0}
}

/* Assistant font polish */

  font-optical-sizing:auto;
}

  letter-spacing:0;
}

  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace !important;
}

.onboard{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  background:
    radial-gradient(circle at 82% 8%,rgba(200,230,255,.9),transparent 36%),
    radial-gradient(circle at 8% 88%,rgba(219,241,255,.9),transparent 34%),
    linear-gradient(135deg,#eef7ff,#e5f1ff);
  color:#173653;
}
.onboardBox{
  width:min(980px,96vw);
  background:rgba(251,253,255,.98);
  border:1px solid #cce2f7;
  border-radius:44px;
  padding:30px;
  box-shadow:0 22px 55px rgba(52,105,150,.14);
}
.onboardBox h1{
  font-size:clamp(44px,6vw,78px);
  line-height:1.05;
  margin:0 0 16px;
  font-weight:1000;
}
.onboardBox p{
  font-size:clamp(22px,2.6vw,32px);
  line-height:1.4;
  color:#4d6e8e;
  font-weight:850;
}
.onboardActions{display:grid;gap:14px;grid-template-columns:1fr 1fr;margin-top:22px}
.onboardCard{
  background:#f4faff;
  border:2px solid #cce2f7;
  border-radius:30px;
  padding:22px;
}
.onboardCard h2{font-size:32px;margin:0 0 10px;font-weight:1000}
.onboardCard input{
  width:100%;
  border:2px solid #cce2f7;
  border-radius:18px;
  padding:14px;
  font-size:22px;
  margin-top:10px;
}
.boardLinks{
  margin-top:20px;
  background:#e3f3ff;
  border-radius:26px;
  padding:18px;
  color:#173653;
  font-size:18px;
  font-weight:850;
}
.boardLinks code{
  display:block;
  direction:ltr;
  text-align:left;
  white-space:nowrap;
  overflow:auto;
  background:white;
  border-radius:14px;
  padding:10px;
  margin-top:8px;
}
.ownerMissing{
  background:#fff0ed;
  border:2px solid #ffc8bb;
  color:#7a2c23;
  border-radius:26px;
  padding:18px;
  margin-top:18px;
  font-size:22px;
  line-height:1.4;
  font-weight:900;

async function resolveFamilyVoiceSource(keyOrKeys){
  const keys=patientVoiceCandidateKeysV48(keyOrKeys);
  for(const key of keys){
    const local=patientLocalVoiceDataV50(key);
    if(local)return patientObjectUrlForVoiceV50(key,local);
    if(__patientVoiceDataCacheV48[key])return __patientVoiceDataCacheV48[key];
    const raw=patientVoiceValueV48(key);
    if(!raw)continue;
    if(raw.startsWith("data:audio")){
      __patientVoiceDataCacheV48[key]=patientObjectUrlForVoiceV50(key,raw);
      return __patientVoiceDataCacheV48[key];
    }
    if(raw.startsWith("drive:")||/^[A-Za-z0-9_-]{25,}$/.test(raw)){
      try{
        const payload=await jsonpAudioV48(key);
        if(payload&&payload.ok&&payload.exists&&payload.dataUrl){
          __patientVoiceDataCacheV48[key]=patientObjectUrlForVoiceV50(key,payload.dataUrl);
          return __patientVoiceDataCacheV48[key];
        }
      }catch(err){console.warn("patient voice jsonp failed",key,err)}
      const id=driveFileIdFromVoiceValue(raw);
      if(id&&id.length>20){
        return driveAudioUrl(id);
      }
    }

function clampNum(n,min,max,fallback){
  n=Number(n);

}
function normalizeTtsText(txt){
  return String(txt||"")
    .replace(/[\u200f\u200e]/g,"")
    .replace(/\s*\/\s*/g," או ")
    .replace(/·/g,". ")
    .replace(/[–—]/g," - ")
    .replace(/[:;]+/g,". ")
    .replace(/\((.*?)\)/g," $1 ")
    .replace(/\s+/g," ")
    .replace(/([.!?])\s*/g,"$1 ")
    .trim();
}
function splitTtsText(txt){
  txt=normalizeTtsText(txt);
  if(!txt)return[];
  const raw=txt.split(/(?<=[.!?])\s+|,\s+/).filter(Boolean);
  const chunks=[];
  let cur="";
  raw.forEach(part=>{
    part=part.trim();
    if(!part)return;
    if((cur+" "+part).trim().length>95){
      if(cur)chunks.push(cur.trim());
      cur=part;
    }else{
      cur=(cur+" "+part).trim();
    }
  });
  if(cur)chunks.push(cur.trim());
  return chunks.length?chunks:[txt];
}

function hebrewVoiceScore(v){
  const pref=(ttsSettings().ttsVoicePreference||"female");
  const n=((v.name||"")+" "+(v.lang||"")+" "+(v.voiceURI||"")).toLowerCase();
  let s=0;
  if((v.lang||"").toLowerCase().startsWith("he"))s+=90;

function appRootUrl(){
  const u=new URL(location.href);
  let path=u.pathname||"/";

  // Repair accidental nested routes created by old relative links.
  path=path.replace(/\/(?:boindex|backoffice)\/(?:index|boindex|patient)\.html$/,"/");
  path=path.replace(/\/(?:boindex|backoffice)\/(?:manifest\.json|favicon\.ico)$/,"/");
  path=path.replace(/\/(?:boindex|backoffice)\/(?:icons|assets)\/.*$/,"/");
  path=path.replace(/\/(?:boindex|backoffice)\/?$/,"/");

  // Normal root files.
  path=path.replace(/\/backoffice\/index\.html$/,"/");
  path=path.replace(/\/backoffice\/?$/,"/");
  path=path.replace(/\/(index|boindex|patient)\.html$/,"/");

  if(!path.endsWith("/")){
    const last=path.split("/").pop()||"";
    if(last.includes("."))path=path.replace(/[^/]*$/,"");
    else path=path+"/";
  }
  path=path.replace(/\/+$/,"/");
  if(!path.startsWith("/"))path="/"+path;
  return u.origin+path;
}

async function togglePatientFullscreen(){
  try{
    if(document.fullscreenElement){
      window.__patientSoftFullscreen=false;
      await document.exitFullscreen();
      applyPatientFullscreenClass();
      render();
      return;

    const target=document.documentElement;
    const req=target.requestFullscreen||target.webkitRequestFullscreen||target.msRequestFullscreen;

        if(result&&typeof result.then==="function")await result;
        window.__patientSoftFullscreen=false;
      }catch(err){
        window.__patientSoftFullscreen=true;

    }else{
      window.__patientSoftFullscreen=true;
    }
  }catch(err){
    console.warn("fullscreen toggle failed",err);
    window.__patientSoftFullscreen=true;
  }
  applyPatientFullscreenClass();
  try{window.scrollTo(0,0)}catch{}
  render();
}
