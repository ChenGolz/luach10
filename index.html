<script>

(function repairNestedBoindexPath(){
  const u=new URL(location.href);
  const fixedPath=u.pathname
    .replace(/\/(?:boindex|backoffice)\/(patient|boindex|index)\.html$/,"/$1.html")
    .replace(/\/(?:boindex|backoffice)\/?$/,"/boindex.html");
  if(fixedPath!==u.pathname){
    u.pathname=fixedPath;
    location.replace(u.toString());
  }
})();



const OWNER_APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbz21NkWRs7yqe5ao_VwEVzURXGn_2IVSwzOQINumgHk48-S0C2XW5PeOyeqeCJcdS-K/exec';
const OWNER_DEFAULT_POLL_MS=60000;
const ONE_LINK_BOARD_KEY="family_clock_board_v4";
const ONE_LINK_MODE_KEY="family_clock_mode_v4";

const FAMILY_ACCESS_KEY_STORAGE="family_clock_family_access_key_v24";
function randomFamilyAccessKey(){
  const arr=new Uint8Array(18);
  crypto.getRandomValues(arr);
  return [...arr].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function currentFamilyAccessKey(){return accessKeyFromUrlOrStorage()}

function familyHashParams(){
  const h=(location.hash||"").replace(/^#/,"");
  return new URLSearchParams(h);
}
function cleanFamilyHashFromUrl(){
  if(!location.hash)return;
  const clean=location.pathname+location.search;
  history.replaceState(history.state||null,"",clean);
}
function accessKeyFromUrlOrStorage(){
  const p=getParams();
  const hp=familyHashParams();
  const fromHash=hp.get("key")||hp.get("token")||hp.get("boardKey")||"";
  const fromQuery=p.get("key")||p.get("token")||p.get("boardKey")||"";
  const key=fromHash||fromQuery||localStorage.getItem(FAMILY_ACCESS_KEY_STORAGE)||"";
  if(key)localStorage.setItem(FAMILY_ACCESS_KEY_STORAGE,key);
  if(fromHash)cleanFamilyHashFromUrl();
  return key;
}
function urlWithFamilyKey(url,key=currentFamilyAccessKey()){
  key=String(key||"").trim();
  if(!key)return url.toString();
  url.hash=`key=${encodeURIComponent(key)}`;
  return url.toString();
}
function missingKeyHtml(){
  const hasBoard=!!currentBoard();
  const hasKey=!!currentFamilyAccessKey();
  if(!hasBoard||hasKey)return"";
  return `<div class="card" style="border:2px solid #f1d596;background:#fff7df;color:#4b3b18"><h2>🔐 ייתכן שחסר מפתח גישה</h2><p>אם הלוח לא נטען, פתחו שוב את הקישור המקורי שקיבלתם במשפחה. אפשר גם להדביק כאן את המפתח אם הוא נשלח בנפרד.</p><input id="manualAccessKey" placeholder="הדבקת מפתח גישה" style="direction:ltr;text-align:left"><button class="bigBtn" onclick="saveManualAccessKey()">שמירת מפתח וטעינה מחדש</button></div>`;
}
function saveManualAccessKey(){
  const el=document.getElementById("manualAccessKey");
  const key=String(el&&el.value||"").trim();
  if(!key)return alert("לא הוזן מפתח");
  setFamilyAccessKey(key);
  location.reload();
}

function setFamilyAccessKey(key){
  key=String(key||"").trim();
  if(key)localStorage.setItem(FAMILY_ACCESS_KEY_STORAGE,key);
}

const HOME_HELP_KEY="family_clock_home_help_seen_v2";



function accessKeyBoardIdV52(){
  try{
    const p=new URLSearchParams(location.search);
    const b=p.get("board")||localStorage.getItem(typeof ACTIVE_BOARD_STORAGE_KEY!=="undefined"?ACTIVE_BOARD_STORAGE_KEY:"luach_active_board_id_v25")||"";
    return typeof normalizeBoardId==="function"?normalizeBoardId(b):String(b||"").trim();
  }catch{return""}
}
function familyAccessKeyStorageKeyV52(boardId=accessKeyBoardIdV52()){
  boardId=String(boardId||"").trim();
  return boardId?`${FAMILY_ACCESS_KEY_STORAGE}_${boardId}`:FAMILY_ACCESS_KEY_STORAGE;
}
function setFamilyAccessKeyV52(key,boardId=accessKeyBoardIdV52()){
  key=String(key||"").trim();
  boardId=String(boardId||"").trim();
  if(!key)return;
  localStorage.setItem(FAMILY_ACCESS_KEY_STORAGE,key); // legacy fallback
  if(boardId)localStorage.setItem(familyAccessKeyStorageKeyV52(boardId),key);
}
function accessKeyFromUrlOrStorageV52(){
  const p=new URLSearchParams(location.search);
  const hp=familyHashParams();
  const boardId=accessKeyBoardIdV52();
  const fromHash=hp.get("key")||hp.get("token")||hp.get("boardKey")||"";
  const fromQuery=p.get("key")||p.get("token")||p.get("boardKey")||"";
  const scoped=boardId?localStorage.getItem(familyAccessKeyStorageKeyV52(boardId))||"":"";
  const legacy=localStorage.getItem(FAMILY_ACCESS_KEY_STORAGE)||"";
  const key=fromHash||fromQuery||scoped||legacy||"";
  if(key)setFamilyAccessKeyV52(key,boardId);
  if(fromHash)cleanFamilyHashFromUrl();
  return key;
}
setFamilyAccessKey=setFamilyAccessKeyV52;
accessKeyFromUrlOrStorage=accessKeyFromUrlOrStorageV52;


const PRIVATE_CLOUD_KEY="family_clock_private_apps_script_url_v17";
const PRIVATE_DRIVE_KEY="family_clock_private_drive_folder_v17";
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function folderIdFromUrlGlobal(value){
  value=String(value||"").trim();
  const m=value.match(/\/folders\/([a-zA-Z0-9_-]+)/);
  return m?m[1]:value;
}
function currentCloudUrl(){
  const p=getParams();
  const fromUrl=p.get("api")||p.get("cloudUrl")||"";
  if(fromUrl){localStorage.setItem(PRIVATE_CLOUD_KEY,fromUrl);return fromUrl}
  return localStorage.getItem(PRIVATE_CLOUD_KEY)||OWNER_APPS_SCRIPT_URL||"";
}
function currentDriveFolder(){
  const p=getParams();
  const fromUrl=folderIdFromUrlGlobal(p.get("driveFolder")||"");
  if(fromUrl){localStorage.setItem(PRIVATE_DRIVE_KEY,fromUrl);return fromUrl}
  return localStorage.getItem(PRIVATE_DRIVE_KEY)||"";
}
function addPrivateParams(params){
  const api=currentCloudUrl();
  const folder=currentDriveFolder();
  const isPrivateApi=api && api!==OWNER_APPS_SCRIPT_URL;
  // Keep shared links short. The public app already knows OWNER_APPS_SCRIPT_URL,
  // so only add api/driveFolder when this device really uses a private Apps Script.
  if(isPrivateApi)params.set("api",api);
  if(isPrivateApi&&folder)params.set("driveFolder",folder);
  return params;
}
function hasOwnerCloud(){return !!currentCloudUrl()}
function savePrivateCloudSetup(){
  const api=(document.getElementById("privateCloudUrl")?.value||"").trim();
  const folder=folderIdFromUrlGlobal((document.getElementById("privateDriveFolder")?.value||"").trim());
  if(!api)return alert("צריך להדביק Google Apps Script Web App URL. קישור רגיל לגוגל שיט לא מספיק.");
  localStorage.setItem(PRIVATE_CLOUD_KEY,api);
  if(folder)localStorage.setItem(PRIVATE_DRIVE_KEY,folder);
  alert("החיבור הפרטי נשמר ✅ עכשיו כל לוח שתפתחו ישתמש בענן הזה.");
  render();
}
function clearPrivateCloudSetup(){
  if(!confirm("למחוק מהמכשיר הזה את החיבור הפרטי?"))return;
  localStorage.removeItem(PRIVATE_CLOUD_KEY);
  localStorage.removeItem(PRIVATE_DRIVE_KEY);
  alert("החיבור הפרטי נמחק מהמכשיר הזה.");
  render();
}


function normalizeBoardId(id){
  id=String(id||"").trim();
  try{id=decodeURIComponent(id)}catch{}
  try{id=id.normalize("NFC")}catch{}
  return id;
}


function getParams(){return new URLSearchParams(location.search)}
function currentBoard(){return normalizeBoardId(getParams().get("board")||localStorage.getItem(ONE_LINK_BOARD_KEY)||"")}
function currentMode(){return getParams().get("mode")||localStorage.getItem(ONE_LINK_MODE_KEY)||"patient"}
function currentTab(){return getParams().get("tab")||""}
function normalizeFamilyName(name){
  name=String(name||"").trim();
  if(!name)return "family";
  return name.replace(/[^\u0590-\u05FFa-zA-Z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,24)||"family";
}
function randomBoardId(){
  const arr=new Uint8Array(12);
  crypto.getRandomValues(arr);
  return "b-"+[...arr].map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,16);
}
function setTopUrl(board,mode,tab=""){
  localStorage.setItem(ONE_LINK_BOARD_KEY,board);
  localStorage.setItem(ONE_LINK_MODE_KEY,mode);
  const url=new URL(location.href);
  url.searchParams.set("board",board);
  url.searchParams.set("mode",mode);
  if(tab)url.searchParams.set("tab",tab); else url.searchParams.delete("tab");
  addPrivateParams(url.searchParams);
  history.replaceState(null,"",url.toString());
}
function oneLink(board){
  const url=new URL(location.href);
  url.search="";
  url.searchParams.set("board",board);
  addPrivateParams(url.searchParams);
  return urlWithFamilyKey(url);
}


function appRootUrl(){
  const u=new URL(location.href);
  let path=u.pathname||"/";

  // Repair accidental nested routes created by old relative links.
  path=path.replace(/\/(?:boindex|backoffice)\/(?:index|boindex|patient)\.html$/,"/");
  path=path.replace(/\/(?:boindex|backoffice)\/(?:manifest\.json|favicon\.ico)$/,"/");
  path=path.replace(/\/(?:boindex|backoffice)\/(?:icons|assets)\/.*$/,"/");
  path=path.replace(/\/(?:boindex|backoffice)\/?$/,"/");

  // Normal root files.
  path=path.replace(/\/backoffice\/index\.html$/,"/");
  path=path.replace(/\/backoffice\/?$/,"/");
  path=path.replace(/\/(index|boindex|patient)\.html$/,"/");

  if(!path.endsWith("/")){
    const last=path.split("/").pop()||"";
    if(last.includes("."))path=path.replace(/[^/]*$/,"");
    else path=path+"/";
  }
  path=path.replace(/\/+$/,"/");
  if(!path.startsWith("/"))path="/"+path;
  return u.origin+path;
}


function directPageUrl(mode,tab=""){
  const board=currentBoard();
  const base=mode==="backoffice"?"./boindex.html":"./patient.html";
  const url=new URL(base,appRootUrl());
  if(board)url.searchParams.set("board",board);
  if(tab)url.searchParams.set("tab",tab);
  addPrivateParams(url.searchParams);
  return urlWithFamilyKey(url);
}
function routeToStandalone(mode=currentMode(),tab=currentTab(),replace=true){
  const board=currentBoard();
  if(!board)return false;
  document.body.classList.add("fast-router-mode");
  const target=directPageUrl(mode||"patient",tab||"");
  if(replace)location.replace(target); else location.href=target;
  return true;
}

function modeUrl(board,mode,tab=""){
  const base=mode==="backoffice"?"./boindex.html":"./patient.html";
  const url=new URL(base,appRootUrl());
  url.searchParams.set("board",board);
  if(tab)url.searchParams.set("tab",tab); else url.searchParams.delete("tab");
  addPrivateParams(url.searchParams);
  return urlWithFamilyKey(url);
}
function frameSrc(mode,board,tab=""){
  const base=mode==="backoffice"?"./boindex.html":"./patient.html";
  const params=new URLSearchParams();
  params.set("board",board);
  if(tab)params.set("tab",tab);
  addPrivateParams(params);
  return base+"?"+params.toString()+(currentFamilyAccessKey()?`#key=${encodeURIComponent(currentFamilyAccessKey())}`:"");
}
function loadFrame(mode,tab=""){
  const board=currentBoard();
  if(!board)return render();
  setTopUrl(board,mode,tab);updateBrowserUrl(mode,tab);
  const f=document.getElementById("screenFrame");
  if(f)f.src=frameSrc(mode,board,tab);
  document.querySelectorAll("[data-mode-btn]").forEach(b=>b.classList.toggle("active", b.dataset.modeBtn===mode));
}

function hardModeUrl(mode,tab=""){
  return directPageUrl(mode,tab);
}
function hardOpenVoice(){routeToStandalone("backoffice","voice",false)}
function hardOpenBackoffice(){routeToStandalone("backoffice","",false)}
function hardOpenPatient(){routeToStandalone("patient","",false)}


function updateBrowserUrl(mode,tab=""){
  const board=currentBoard();
  if(!board)return;
  const url=new URL(location.href);
  url.searchParams.set("board",board);
  url.searchParams.set("mode",mode||"patient");
  if(tab)url.searchParams.set("tab",tab); else url.searchParams.delete("tab");
  addPrivateParams(url.searchParams);
  history.pushState({board,mode,tab},"",urlWithFamilyKey(url));
}
window.addEventListener("message",event=>{
  const msg=event.data||{};
  if(!msg || msg.type!=="family-clock-route")return;
  const mode=msg.mode||currentMode();
  const tab=msg.tab||"";
  updateBrowserUrl(mode,tab);
},false);

function openMode(mode){routeToStandalone(mode,"",false)}
function openVoice(){routeToStandalone("backoffice","voice",false)}
async function copyOneLink(){
  const board=currentBoard();
  const text=oneLink(board);
  try{await navigator.clipboard.writeText(text);alert("הקישור הועתק ✅")}
  catch{prompt("העתיקו את הקישור:",text)}
}
function sendWhatsappInvite(){
  const board=currentBoard();
  if(!board)return alert("צריך קודם ליצור לוח משפחתי");
  const link=oneLink(board);
  const text=encodeURIComponent(
    `שלום! יצרתי עבורנו את "השעון המשפחתי".\n\n`+
    `לא צריך להוריד שום דבר, לא צריך לפתוח חשבון ולא צריך סיסמה.\n`+
    `זה פשוט דף אינטרנט: לוחצים על הקישור והוא נפתח מיד:\n${link}\n\n`+
    `מאותו קישור אפשר לראות את השעון המשפחתי ולעדכן תמונות, הודעות ושגרה.`
  );
  window.open(`https://wa.me/?text=${text}`,"_blank");
}
function createBoard(){
  if(!hasOwnerCloud())return render();
  const id=randomBoardId();
  setFamilyAccessKey(randomFamilyAccessKey(),id);
  localStorage.setItem(ONE_LINK_BOARD_KEY,id);
  setTimeout(()=>routeToStandalone("backoffice","",true),20);
}
function joinBoard(){
  let value=(document.getElementById("joinBoardInput")?.value||"").trim();
  if(!value)return alert("צריך להדביק קישור או Family ID");
  try{
    if(value.includes("http")||value.includes("?")){
      const u=new URL(value);
      const hp=new URLSearchParams((u.hash||"").replace(/^#/,""));
      const key=hp.get("key")||hp.get("token")||hp.get("boardKey")||u.searchParams.get("key")||u.searchParams.get("token")||u.searchParams.get("boardKey")||"";
      if(key)setFamilyAccessKey(key);
      const boardId=u.searchParams.get("board");
      if(!boardId){
        alert("הקישור שהודבק אינו מכיל מזהה לוח (board) תקין. אנא ודאו שהעתקתם את הקישור המלא.");
        return;
      }
      value=boardId;
    }
  }catch(e){
    alert("שגיאה בניתוח הקישור. אנא ודאו שהקישור הועתק במלואו.");
    return;
  }
  if(!value)return alert("לא נמצא Family ID");
  localStorage.setItem(ONE_LINK_BOARD_KEY,value);
  setTimeout(()=>routeToStandalone("backoffice","",true),20);
}
function portal(){
  const missing=!hasOwnerCloud();
  return `<main class="portal"><div class="portalBox"><h1>השעון המשפחתי</h1><p>לא צריך לפתוח חשבון, לא צריך סיסמה, ולא צריך להוריד שום דבר. זה פשוט דף אינטרנט משפחתי: פותחים קישור אחד, ומשם עוברים בלחיצה בין תצוגת הלוח לבין ניהול המשפחה.</p>${missing?`<div class="ownerMissing">הגדרת מנהלת האתר חסרה: צריך להדביק פעם אחת את כתובת Google Apps Script בתוך OWNER_APPS_SCRIPT_URL.</div>`:""}<div class="portalSteps"><div class="portalStep"><div class="portalNum">1</div><div><strong>כתבו שם משפחה או שם האדם</strong><span>זה רק כדי שיהיה קל לזהות את הלוח.</span></div></div><div class="portalStep"><div class="portalNum">2</div><div><strong>לחצו יצירת לוח</strong><span>המערכת תיצור Family ID ארוך וגם מפתח גישה פרטי בתוך הקישור.</span></div></div><div class="portalStep"><div class="portalNum">3</div><div><strong>שמרו קישור אחד</strong><span>אותו קישור עובד גם לתצוגת הלוח וגם לניהול.</span></div></div></div><div class="cards"><div class="card"><h2>יצירת שעון משפחתי חדש</h2><p>מתאים למשפחה שמתחילה עכשיו.</p><input id="newFamilyName" placeholder="שם משפחה / שם האדם"><button type="button" class="bigBtn" onclick="createBoard()" ${missing?"disabled":""}>יצירת לוח וקבלת קישור אחד</button></div><div class="card"><h2>כניסה ללוח קיים</h2><p>אם כבר קיבלתם קישור או Family ID, הדביקו אותו כאן.</p><input id="joinBoardInput" placeholder="הדבקת קישור או Family ID" dir="ltr"><button type="button" class="bigBtn green" onclick="joinBoard()">כניסה ללוח</button></div></div><details class="card privateSection"><summary style="cursor:pointer;font-size:24px;font-weight:1000">חיבור פרטי למשפחה אחרת</summary><p>אם חבר/ה רוצים שהכול יישמר רק בגוגל שלהם, מדביקים כאן Web App URL של Apps Script ותיקיית Drive שלהם. קישור רגיל לגוגל שיט לא מספיק.</p><input id="privateCloudUrl" placeholder="Google Apps Script Web App URL" dir="ltr" value="${esc(currentCloudUrl()&&currentCloudUrl()!==OWNER_APPS_SCRIPT_URL?currentCloudUrl():"")}"><input id="privateDriveFolder" placeholder="קישור או Folder ID של תיקיית Drive להקלטות" dir="ltr" value="${esc(currentDriveFolder())}"><button type="button" class="bigBtn green" onclick="savePrivateCloudSetup()">שמירת חיבור פרטי</button><button type="button" class="bigBtn" onclick="clearPrivateCloudSetup()">ניקוי חיבור פרטי מהמכשיר</button></details><div class="small">אם יודעים לפתוח קישור מוואטסאפ - יודעים להשתמש בזה. הקישורים עובדים בטאבלט ובמחשב.</div></div></main>`;
}

function appShell(){
  const board=currentBoard();
  const mode=currentMode();
  const tab=currentTab();
  return `<div class="shell"><header class="topbar"><div class="toprow"><div class="brand">🧩 השעון המשפחתי <span class="badge">${board}</span>${currentCloudUrl()&&currentCloudUrl()!==OWNER_APPS_SCRIPT_URL?`<span class="badge">ענן פרטי</span>`:""}</div><div class="tabs"><button type="button" class="btn ${mode==="patient"?"active":""}" data-mode-btn="patient" onclick="openMode('patient')">👁️ תצוגת הלוח</button><button type="button" class="btn ${mode==="backoffice"&&!tab?"active":""}" data-mode-btn="backoffice" onclick="openMode('backoffice')">⚙️ ניהול</button><button type="button" class="btn soft" onclick="copyOneLink()">🔗 העתקת הקישור</button><button type="button" class="btn soft" onclick="sendWhatsappInvite()">📲 שליחה בוואטסאפ</button></div></div></header><main>${missingKeyHtml()}<iframe id="screenFrame" src="${frameSrc(mode,board,tab)}" title="השעון המשפחתי" allow="fullscreen; autoplay" allowfullscreen></iframe></main></div>`;
}
function showHomeHelp(){
  if(localStorage.getItem(HOME_HELP_KEY))return;
  const div=document.createElement("div");
  div.className="homeHelp";
  div.innerHTML=`<div class="homeHelpBox"><h2>להפוך את זה לשעון במסך מלא</h2><p>לא צריך להוריד דף משפחתי. אפשר פשוט להוסיף את הקישור למסך הבית, כדי שייפתח נקי וברור כמו שעון קיר.</p><div class="homeHelpGrid"><div class="homeHelpCard"><div class="homeHelpIcon">📤</div><strong>באייפון / אייפד</strong><span>לחצו על כפתור השיתוף ואז “הוסף למסך הבית”.</span></div><div class="homeHelpCard"><div class="homeHelpIcon">⋮</div><strong>באנדרואיד / Chrome</strong><span>לחצו על תפריט שלוש הנקודות ואז “הוסף למסך הבית”.</span></div></div><button type="button" class="bigBtn" id="homeHelpOk">הבנתי, להמשיך</button></div>`;
  document.body.appendChild(div);
  document.getElementById("homeHelpOk").onclick=()=>{localStorage.setItem(HOME_HELP_KEY,"1");div.remove()};
}
function render(){
  const board=currentBoard();
  if(board){
    document.body.classList.add("fast-router-mode");
    document.getElementById("app").innerHTML=`<main class="routeLoading"><div class="routeLoadingBox"><h1>פותח את השעון המשפחתי…</h1><p>רגע קטן, עוברים לתצוגה המתאימה.</p></div></main>`;
    setTimeout(()=>routeToStandalone(currentMode(),currentTab(),true),20);
    return;
  }
  document.body.classList.remove("fast-router-mode");
  document.getElementById("app").innerHTML=portal();
}
window.addEventListener("popstate",render);
render();
setTimeout(showHomeHelp,900);
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
